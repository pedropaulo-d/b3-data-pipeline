# Configuração do app Streamlit (Etapa 7). VERSIONÁVEL: contém apenas
# preferências de tema e telemetria — nenhum segredo. Segredos do app vão
# em .streamlit/secrets.toml (gitignored) ou no painel do Streamlit Cloud.
#
# Streamlit lê este arquivo a partir do diretório de trabalho — a raiz do
# repo, tanto local (`streamlit run dashboard/app.py`) quanto na nuvem.
# Propositalmente NÃO definimos opções de [server]: porta, headless e
# endereço são gerenciados pelo Streamlit Cloud.

[theme]
# Tema ESCURO padrão do Streamlit (valores oficiais), para o app na nuvem
# usar modo escuro por padrão para qualquer visitante — idêntico ao que se
# via localmente. Os gráficos Plotly acompanham este tema automaticamente:
# `st.plotly_chart` usa `theme="streamlit"` por padrão, então herda o fundo
# escuro sem precisar de template Plotly hardcoded.
base = "dark"
primaryColor = "#FF4B4B"               # vermelho de destaque dos widgets
backgroundColor = "#0E1117"            # fundo principal
secondaryBackgroundColor = "#262730"   # sidebar, cartões, tabela
textColor = "#FAFAFA"

[browser]
gatherUsageStats = false
