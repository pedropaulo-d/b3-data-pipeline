# Compose único do projeto (renomeado de docker-compose.minio.yml na
# Etapa 5). Originalmente continha apenas MinIO (Etapa 2); o Airflow
# entrou aqui em vez de virar um compose separado porque orquestrador
# e object storage precisam estar na mesma rede Docker para que a DAG
# resolva `minio:9000` pelo DNS interno.
#
# O nome canônico `docker-compose.yml` é carregado por padrão pelo
# Docker Compose (sem `-f`).
#
# Serviços:
#
#   minio              -> servidor S3-compatível (Etapa 2)
#   mc-init            -> cria o bucket b3-data na primeira subida (Etapa 2)
#   postgres           -> backend de metadados do Airflow (Etapa 5)
#   airflow-init       -> roda `airflow db migrate` + cria usuário admin
#                         (Etapa 5; roda uma vez e sai)
#   airflow-webserver  -> UI do Airflow em :8080 (Etapa 5)
#   airflow-scheduler  -> scheduler do Airflow (LocalExecutor; Etapa 5)
#
# Endpoint MinIO dentro da rede Docker: http://minio:9000
# Endpoint MinIO no host (fora do Docker): http://localhost:9000
# Detalhes em airflow/README.md.

# Bloco YAML reaproveitado pelos três serviços do Airflow (init,
# webserver, scheduler). Imagem custom, variáveis de ambiente, volumes
# e dependência de Postgres ficam DRY aqui.
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    # A senha do Postgres é parametrizada (M2). Mantemos a string de
    # conexão em sincronia com o serviço `postgres` usando a MESMA
    # variável e o MESMO default — trocar a senha no .env atualiza os
    # dois lados de uma vez. (Vai além do M2 literal, que só citava o
    # serviço postgres: deixar a conn hardcoded em `airflow` seria um
    # footgun silencioso.)
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:-airflow}@postgres/airflow
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: America/Sao_Paulo
    # EXPOSE_CONFIG=false (M1): a UI não expõe o airflow.cfg renderizado
    # (que pode conter conn strings e segredos). Para inspecionar config
    # via UI em dev, trocar para "true" temporariamente.
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    # Secret key do webserver (M4): assina cookies de sessão e tokens
    # CSRF. Resolvida pelo Compose a partir do .env; em dev local
    # qualquer valor serve, em produção precisa ser único e secreto.
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-CHANGE_ME_IN_PRODUCTION}
    # Credenciais do admin criado pelo airflow-init (M3). Injetadas no
    # ambiente do container; o bash do entrypoint as lê via $${VAR}
    # (escapado para o Compose NÃO interpolar antes da hora — mesmo
    # padrão comprovado do serviço mc-init logo abaixo).
    AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
    AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    # Endpoint do MinIO no DNS interno do Compose. O .env do host usa
    # localhost:9000 — DENTRO do container Docker, "localhost" é o
    # próprio container, não o MinIO. Por isso sobrescrevemos aqui.
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ENDPOINT_HOST_PORT: minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    MINIO_BUCKET: ${MINIO_BUCKET:-b3-data}
    MINIO_REGION: ${MINIO_REGION:-us-east-1}
  volumes:
    # DAGs, logs e plugins do Airflow vivem dentro de airflow/ no host
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    # Projeto inteiro montado em /opt/project — os BashOperators chamam
    # `python -m ingestion.main`, `python -m warehouse.setup` e `dbt`
    # com cwd /opt/project. Montar a raiz inteira (em vez de bind
    # mounts por arquivo) simplifica e cobre warehouse.duckdb
    # automaticamente, evitando o problema de mount de arquivo
    # individual antes do arquivo existir.
    - .:/opt/project
  depends_on:
    postgres:
      condition: service_healthy
    airflow-init:
      condition: service_completed_successfully

services:
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: b3-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  mc-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: b3-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-b3-data}
    # Cria o bucket b3-data se ainda não existir e termina.
    # O alias `local` aponta para o container MinIO via DNS interno do
    # Compose (`minio:9000`), não localhost.
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/$${MINIO_BUCKET} &&
        echo 'Bucket pronto: '$${MINIO_BUCKET}
      "
    restart: "no"

  postgres:
    image: postgres:15
    container_name: b3-airflow-postgres
    environment:
      POSTGRES_USER: airflow
      # M2: senha parametrizada. Default `airflow` mantém o dev local
      # funcionando sem .env; produção sobrescreve via POSTGRES_PASSWORD.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: b3-airflow-init
    # airflow-init NÃO depende de si mesmo: sobrescreve a herança do
    # bloco comum (que põe airflow-init em depends_on).
    depends_on:
      postgres:
        condition: service_healthy
    # Init container: roda migrate + cria usuário admin e sai com 0.
    # Re-executar é seguro: `db migrate` é idempotente; `users create`
    # falha previsivelmente quando admin já existe — ignoramos via
    # `|| true` para a primeira subida e as subsequentes ficarem ok.
    #
    # NOTA YAML: o script vai num bloco literal `|` (preserva newlines
    # como separadores de comando no bash) passado para `bash -c` via
    # forma de array do entrypoint. Tentar a forma folded `>` quebra:
    # YAML `>` preserva newlines em linhas com indentação extra, e os
    # args do `airflow users create` ficam um por linha — bash recebe
    # `\n` literal antes do `|| true` e dispara "syntax error".
    # M3: usuário/senha do admin vêm de AIRFLOW_ADMIN_USERNAME/PASSWORD
    # (definidos no bloco environment de x-airflow-common, herdado aqui).
    # Usamos $${VAR} — o `$$` faz o Compose NÃO interpolar; quem resolve
    # é o bash DENTRO do container, lendo a env já injetada. É a forma
    # comprovada (idêntica ao mc-init), sem ambiguidade de dupla
    # interpolação dentro do bloco literal do entrypoint.
    entrypoint:
      - /bin/bash
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "$${AIRFLOW_ADMIN_USERNAME}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: b3-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: b3-airflow-scheduler
    command: scheduler
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  minio_data:
    name: b3-minio-data
  airflow_postgres_data:
    name: b3-airflow-postgres-data
