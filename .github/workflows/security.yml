# ============================================================
# CI de segurança (M6)
# ============================================================
# Dois controles, simples e auditáveis (este projeto é portfólio — a
# ideia é que um recrutador leia e entenda em 30 segundos):
#
#   1) pip-audit  -> procura CVEs conhecidos nas dependências Python.
#   2) gitleaks   -> procura secrets (chaves, senhas) vazados no histórico.
#
# Qualquer um dos dois falha o build se encontrar problema.

name: security

# Roda em todo push para main e em todo pull request.
on:
  push:
    branches: [main]
  pull_request:

# Permissões mínimas: só leitura do conteúdo do repo.
permissions:
  contents: read

jobs:
  # ----------------------------------------------------------
  # 1) Auditoria de CVEs nas dependências Python
  # ----------------------------------------------------------
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Instala SÓ o pip-audit (não o requirements-dev completo): a
      # auditoria abaixo roda sobre o arquivo declarado, não sobre o
      # ambiente do runner, então não há motivo de instalar Jupyter aqui.
      - name: Instalar pip-audit
        run: pip install pip-audit

      # Auditamos APENAS o runtime declarado (requirements.txt). As
      # dependências de desenvolvimento (Jupyter, plotly — em
      # requirements-dev.txt) são responsabilidade local e NÃO fazem parte
      # do deploy, logo não compõem a superfície de produção. O lock NÃO é
      # auditado: foi gerado de um venv com deps de dev (ver DT-SEC.4) e
      # auditá-lo reintroduziria CVEs de transitivas do Jupyter.
      #
      # pip-audit -r resolve a árvore de deps DO ARQUIVO (não do ambiente)
      # e sai com código != 0 — falhando o job — em qualquer CVE conhecido.
      - name: Rodar pip-audit
        run: pip-audit -r requirements.txt

  # ----------------------------------------------------------
  # 2) Varredura de secrets no histórico do Git
  # ----------------------------------------------------------
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 traz o histórico completo — gitleaks varre
          # todos os commits, não só o último.
          fetch-depth: 0

      # Action oficial do gitleaks. Falha o job se encontrar secret.
      - name: Rodar gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
