# Compose dedicado ao serviço de object storage da Etapa 2.
#
# Decisões refletidas (ver docs/decisoes.md):
# - Arquivo na raiz do repositório, separado por etapa.
# - Bucket único `b3-data` com prefixos por camada.
# - Mesmas credenciais usadas pelo cliente Python (variáveis lidas do .env)
#   e pelo servidor MinIO — para não duplicar segredo em dois lugares.
#
# O serviço auxiliar `mc-init` roda uma vez no primeiro `up` e cria o
# bucket. Em execuções subsequentes, `--ignore-existing` torna a operação
# idempotente.

services:
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: b3-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  mc-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: b3-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-b3-data}
    # Cria o bucket b3-data se ainda não existir e termina.
    # O alias `local` aponta para o container MinIO via DNS interno do
    # Compose (`minio:9000`), não localhost.
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/$${MINIO_BUCKET} &&
        echo 'Bucket pronto: '$${MINIO_BUCKET}
      "
    restart: "no"

volumes:
  minio_data:
    name: b3-minio-data
